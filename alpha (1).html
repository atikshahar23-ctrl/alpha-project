<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Assistant:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#e9eefb; --dim:#7c8aa8; --gold:#ffc24d; --cyan:#5fe6ff; --line:rgba(120,160,220,.14); }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Assistant",system-ui,sans-serif;background:#04060d;color:var(--ink);overflow:hidden}
  #scene{position:fixed;inset:0;z-index:0}

  /* corner chrome */
  .chrome{position:fixed;z-index:2;font-family:"Space Grotesk";color:var(--dim)}
  .topL{top:22px;left:24px;display:flex;align-items:baseline;gap:12px}
  .topL .clk{font-size:26px;font-weight:500;letter-spacing:1px;color:var(--ink)}
  .topL .sub{font-size:11px;letter-spacing:2px;text-transform:uppercase}
  .topR{top:24px;right:24px;display:flex;gap:10px}
  .chip{font-family:"Space Grotesk";font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);
    border:1px solid rgba(95,230,255,.3);background:rgba(95,230,255,.05);padding:7px 13px;border-radius:6px;cursor:pointer;transition:.18s}
  .chip:hover{background:rgba(95,230,255,.14)}
  .chip.ghost{color:var(--dim);border-color:var(--line)}
  .menu{top:50%;left:24px;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;min-width:152px}
  .menu .mh{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);opacity:.6;margin-bottom:8px}
  .menu button{text-align:right;background:none;border:none;border-right:2px solid transparent;color:var(--dim);
    font-family:"Assistant";font-size:15px;font-weight:400;padding:7px 12px 7px 8px;cursor:pointer;transition:.16s;border-radius:0 6px 6px 0}
  .menu button:hover{color:var(--ink);border-right-color:var(--gold);background:rgba(255,194,77,.06)}
  .cmd{bottom:120px;right:24px}
  .cmd .chip{color:var(--gold);border-color:rgba(255,194,77,.4);background:rgba(255,194,77,.06)}
  .cmd .chip:hover{background:rgba(255,194,77,.15)}

  /* dock: transcript + input */
  .dock{position:fixed;z-index:2;left:50%;bottom:0;transform:translateX(-50%);width:min(620px,92vw);display:flex;flex-direction:column;align-items:center}
  .state{font-family:"Space Grotesk";font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);height:16px;margin-bottom:10px;transition:color .3s}
  .log{width:100%;max-height:32vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:6px 4px;
    scrollbar-width:none;-webkit-mask-image:linear-gradient(to bottom,transparent,#000 26px)}
  .log::-webkit-scrollbar{display:none}
  .turn{display:flex;flex-direction:column;gap:2px;animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .turn .who{font-family:"Space Grotesk";font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);opacity:.65}
  .turn .txt{font-size:16px;line-height:1.55;font-weight:300}
  .turn.me .txt{color:var(--dim)} .turn.al .txt{color:var(--ink)}
  .turn.sys .txt{font-size:13px;color:var(--dim);font-style:italic}
  .bar{width:100%;display:flex;align-items:center;gap:9px;padding:14px 0 24px}
  .pill{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:28px;padding:5px 7px 5px 18px;backdrop-filter:blur(12px);transition:.22s}
  .pill:focus-within{border-color:rgba(95,230,255,.4)}
  .pill input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:"Assistant";font-size:16px;font-weight:300}
  .pill input::placeholder{color:var(--dim)}
  .ic{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:grid;place-items:center;font-size:16px;flex:0 0 auto;transition:.2s}
  .send{background:var(--ink);color:#04060d}.send:hover{transform:scale(1.06)}
  .mic{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink)}.mic:hover{border-color:rgba(95,230,255,.4)}
  .mic.on{background:#ff5d73;border-color:#ff5d73;color:#fff;animation:mp 1.1s infinite}
  @keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(255,93,115,.5)}50%{box-shadow:0 0 0 11px rgba(255,93,115,0)}}

  .overlay{position:fixed;inset:0;z-index:30;background:rgba(4,6,13,.82);backdrop-filter:blur(14px);display:none;place-items:center;padding:22px}
  .overlay.show{display:grid}
  .card{width:100%;max-width:430px;background:rgba(16,20,34,.92);border:1px solid var(--line);border-radius:22px;padding:30px}
  .card h2{font-family:"Space Grotesk";font-weight:500;letter-spacing:1px;font-size:20px;margin-bottom:6px}
  .card p{color:var(--dim);font-size:14px;line-height:1.6;margin-bottom:8px;font-weight:300}
  .card label{display:block;font-size:12px;color:var(--dim);margin:16px 0 7px}
  .card input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:13px;padding:13px 15px;color:var(--ink);font-family:"Assistant";font-size:15px;outline:none}
  .card input:focus{border-color:rgba(95,230,255,.4)}
  .card .go{width:100%;margin-top:22px;padding:14px;border:none;border-radius:13px;cursor:pointer;font-family:"Space Grotesk";font-weight:500;letter-spacing:1px;font-size:15px;background:var(--gold);color:#1a1304}
  .card a{color:var(--cyan);text-decoration:none}
  .card .hint{font-size:12px;color:var(--dim);margin-top:14px;line-height:1.7;font-weight:300}

  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  @media(max-width:760px){.menu{display:none}.cmd{bottom:110px;right:16px}.topL .clk{font-size:20px}}
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="chrome topL"><span class="clk" id="clock">--:--</span><span class="sub" id="csub">SYSTEM ONLINE</span></div>
  <div class="chrome topR">
    <button class="chip ghost" id="newChat">+ NEW CHAT</button>
    <button class="chip ghost" id="logout">LOGOUT</button>
  </div>
  <nav class="chrome menu">
    <div class="mh">ALPHA</div>
    <button data-p="סכם לי את עיקרי היום בקצרה">סיכום יומי</button>
    <button data-p="עזור לי לנסח מייל. הנושא: ">ניסוח מייל</button>
    <button data-p="תן לי רעיון יצירתי בנושא ">רעיון יצירתי</button>
    <button data-p="עזור לי לתכנן משימה: ">תכנון משימה</button>
    <button data-p="תרגם עבורי לאנגלית: ">תרגום</button>
  </nav>
  <div class="chrome cmd"><button class="chip" id="cmdBtn">⌘ COMMAND CENTER</button></div>

  <div class="dock">
    <div class="state" id="state">מנוחה</div>
    <div class="log" id="chat"></div>
    <div class="bar">
      <button class="ic mic" id="micBtn" title="דבר">🎙</button>
      <div class="pill"><input id="input" type="text" placeholder="כתוב או דבר אל Alpha…" autocomplete="off"></div>
      <button class="ic send" id="sendBtn" title="שלח">↑</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card">
      <h2>Alpha</h2>
      <p>הזן מפתח Gemini חינמי כדי להפעיל. נשמר רק במחשב שלך.</p>
      <label>שם העוזר</label>
      <input id="nameInput" type="text" value="ALPHA">
      <label>מפתח Gemini API</label>
      <input id="keyInput" type="password" placeholder="AIza...">
      <button class="go" id="saveBtn">הפעל</button>
      <div class="hint">מפתח חינמי: <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> → Create API key.<br>לקול: הרץ מ-http://localhost (לא בלחיצה כפולה).</div>
    </div>
  </div>

<script>
const $=id=>document.getElementById(id);
const MODEL='gemini-3.5-flash';
const state={ key:localStorage.getItem('alpha_key')||'', name:localStorage.getItem('alpha_name')||'ALPHA', history:[], voiceOn:true };
function systemPrompt(){ return `אתה ${state.name}, עוזר אישי מתקדם הדובר עברית רהוטה. רגוע, חד, תמציתי. תשובות קצרות וזורמות כמו בשיחה קולית, בלי רשימות ארוכות או טבלאות. ענה תמיד בעברית אלא אם התבקשת אחרת.`; }

/* ---------- canvas ---------- */
const DPR=Math.min(devicePixelRatio||1,2);
const cnv=$('scene'); let ctx,W,H;
function fit(){ W=innerWidth;H=innerHeight; cnv.width=W*DPR;cnv.height=H*DPR; ctx=cnv.getContext('2d'); ctx.setTransform(DPR,0,0,DPR,0,0); }
fit(); addEventListener('resize',fit);

/* glow sprite for plasma particles (perf) */
const sprite=document.createElement('canvas'); sprite.width=sprite.height=32;
{ const s=sprite.getContext('2d'); const g=s.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0,'rgba(190,250,255,1)'); g.addColorStop(.4,'rgba(95,230,255,.7)'); g.addColorStop(1,'rgba(95,230,255,0)');
  s.fillStyle=g; s.fillRect(0,0,32,32); }

/* core plasma particles (normalized) */
const PARTS=Array.from({length:240},()=>{ const a=Math.random()*6.283, d=Math.pow(Math.random(),.6);
  return {a,d,ph:Math.random()*6.283,sp:.4+Math.random()*1.4,sz:.05+Math.random()*.16}; });

/* flowing light threads */
const THREADS=Array.from({length:11},(_,i)=>({
  off:.30+Math.random()*.34, amp:24+Math.random()*70, f:.0018+Math.random()*.0030,
  sp:.18+Math.random()*.5*(Math.random()<.5?-1:1), ph:Math.random()*6.283,
  w:.7+Math.random()*1.5, al:.10+Math.random()*.34, hue:Math.random()<.18?'168,130,255':'95,230,255' }));

/* orbiting nodes */
const NODES=[{a:0,c:'255,206,110'},{a:2.1,c:'176,124,255'},{a:4.0,c:'255,138,208'},{a:5.3,c:'95,230,255'}];

let amp=.06, ampTarget=.06, speaking=false;
function drawScene(t){
  // background
  const bg=ctx.createRadialGradient(W*.5,H*.42,0,W*.5,H*.42,Math.max(W,H)*.75);
  bg.addColorStop(0,'#0a1022'); bg.addColorStop(1,'#04060d');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  amp+=(ampTarget-amp)*.07; const breath=.04*Math.sin(t*.8), A=amp+breath;
  const cx=W*.5, cy=H*.42, R=Math.max(70,Math.min(150,Math.min(W,H)*.13))*(1+A*.08);

  // flowing threads (additive)
  ctx.globalCompositeOperation='lighter';
  for(const L of THREADS){ const yb=H*L.off;
    ctx.beginPath();
    for(let x=-20;x<=W+20;x+=8){
      const y=yb+Math.sin(x*L.f+t*L.sp+L.ph)*L.amp+Math.sin(x*L.f*2.3+t*L.sp*1.5)*L.amp*.4;
      if(x<=-20)ctx.moveTo(x,y); else ctx.lineTo(x,y); }
    ctx.strokeStyle=`rgba(${L.hue},${L.al})`; ctx.lineWidth=L.w; ctx.shadowColor=`rgba(${L.hue},.8)`; ctx.shadowBlur=8; ctx.stroke();
  }
  ctx.shadowBlur=0; ctx.globalCompositeOperation='source-over';

  // pedestal glow
  const ped=ctx.createRadialGradient(cx,cy+R*1.15,0,cx,cy+R*1.15,R*1.3);
  ped.addColorStop(0,'rgba(255,194,77,.22)'); ped.addColorStop(1,'rgba(255,194,77,0)');
  ctx.fillStyle=ped; ctx.save(); ctx.translate(cx,cy+R*1.15); ctx.scale(1,.32); ctx.beginPath(); ctx.arc(0,0,R*1.3,0,6.283); ctx.fill(); ctx.restore();

  // gold corona halo
  const halo=ctx.createRadialGradient(cx,cy,R*.6,cx,cy,R*1.7);
  halo.addColorStop(0,'rgba(255,194,77,0)'); halo.addColorStop(.62,`rgba(255,180,70,${.10+A*.18})`); halo.addColorStop(1,'rgba(255,160,40,0)');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(cx,cy,R*1.7,0,6.283); ctx.fill();

  // cyan core base glow
  const coreR=R*.80;
  const cb=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  cb.addColorStop(0,`rgba(150,245,255,${.5+A*.3})`); cb.addColorStop(.6,'rgba(60,200,255,.28)'); cb.addColorStop(1,'rgba(20,120,200,0)');
  ctx.fillStyle=cb; ctx.beginPath(); ctx.arc(cx,cy,coreR,0,6.283); ctx.fill();

  // granular plasma particles
  ctx.globalCompositeOperation='lighter';
  for(const p of PARTS){ const dr=p.d*coreR*(.92+.08*Math.sin(t*p.sp+p.ph));
    const px=cx+Math.cos(p.a+t*.25*p.sp)*dr, py=cy+Math.sin(p.a*1.03+t*.25*p.sp)*dr;
    const fl=.55+.45*Math.sin(t*p.sp*3+p.ph); const sz=R*p.sz*(1+A*.5);
    ctx.globalAlpha=fl*(.6+A*.4); ctx.drawImage(sprite,px-sz,py-sz,sz*2,sz*2); }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';

  // gold ring band
  ctx.beginPath(); ctx.arc(cx,cy,R,0,6.283);
  const rg=ctx.createLinearGradient(cx,cy-R,cx,cy+R);
  rg.addColorStop(0,'#ffe39a'); rg.addColorStop(.5,'#ffb43a'); rg.addColorStop(1,'#e8860f');
  ctx.strokeStyle=rg; ctx.lineWidth=R*.085; ctx.shadowColor='rgba(255,180,60,.9)'; ctx.shadowBlur=18+A*22; ctx.stroke();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(cx,cy,R*.95,0,6.283); ctx.strokeStyle='rgba(255,240,200,.55)'; ctx.lineWidth=1; ctx.stroke();

  // orbiting nodes
  for(const n of NODES){ const ang=n.a+t*.22; const ex=cx+Math.cos(ang)*R*1.04, ey=cy+Math.sin(ang)*R*1.04*.96;
    const pl=.6+.4*Math.sin(t*2+n.a); ctx.fillStyle=`rgba(${n.c},${.8})`; ctx.shadowColor=`rgba(${n.c},.9)`; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(ex,ey,2.6+pl*1.6,0,6.283); ctx.fill(); }
  ctx.shadowBlur=0;
}
(function loop(){ const t=performance.now()/1000; drawScene(t); requestAnimationFrame(loop); })();

/* ---------- clock ---------- */
function pad(n){return String(n).padStart(2,'0')}
setInterval(()=>{ const d=new Date(); $('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes()); },1000);
{ const d=new Date(); $('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes()); }

/* ---------- state ---------- */
function setState(s){ const lbl={listening:'מקשיב',thinking:'חושב',speaking:'מדבר'}[s]||'מנוחה';
  $('state').textContent=lbl; $('state').style.color=s?'var(--cyan)':'var(--dim)';
  speaking=(s==='speaking'); ampTarget=s==='speaking'?.95:s==='listening'?.5:.06; }
function addMsg(text,who){ const lbl={me:'אתה',al:state.name,sys:'מערכת'}[who];
  const d=document.createElement('div'); d.className='turn '+who; d.innerHTML=`<span class="who">${lbl}</span><div class="txt"></div>`;
  $('chat').appendChild(d); const txt=d.querySelector('.txt');
  if(who==='al'){ let i=0;(function tw(){ txt.textContent=text.slice(0,i++); $('chat').scrollTop=$('chat').scrollHeight; if(i<=text.length)setTimeout(tw,14); })(); }
  else txt.textContent=text;
  $('chat').scrollTop=$('chat').scrollHeight; }

/* ---------- Gemini ---------- */
async function ask(text){ if(!state.key){ openSetup(); return; }
  state.history.push({role:'user',parts:[{text}]}); setState('thinking');
  try{ const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`,{
      method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':state.key},
      body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt()}]},contents:state.history.slice(-16),generationConfig:{temperature:.8,maxOutputTokens:800}})});
    if(!res.ok){ const e=await res.text(); throw new Error(res.status+' '+e); }
    const data=await res.json(); const reply=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim()||'…';
    state.history.push({role:'model',parts:[{text:reply}]}); addMsg(reply,'al'); speak(reply);
  }catch(err){ setState(''); const s=''+err; addMsg((s.includes('400')||s.includes('403'))?'מפתח Gemini לא תקין — פתח COMMAND CENTER ובדוק.':'תקלת חיבור: '+err.message,'sys'); } }

/* ---------- voice ---------- */
let heVoice=null; function loadVoices(){ const v=speechSynthesis.getVoices(); heVoice=v.find(x=>x.lang.startsWith('he'))||v.find(x=>x.lang.startsWith('en'))||v[0]; }
loadVoices(); speechSynthesis.onvoiceschanged=loadVoices;
function speak(text){ if(!state.voiceOn||!('speechSynthesis'in window)){ setState(''); return; }
  speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='he-IL'; if(heVoice)u.voice=heVoice; u.rate=1.02;
  u.onstart=()=>setState('speaking'); u.onend=()=>setState(''); u.onerror=()=>setState(''); speechSynthesis.speak(u); }
const SR=window.SpeechRecognition||window.webkitSpeechRecognition; let rec=null,listening=false;
if(SR){ rec=new SR(); rec.lang='he-IL'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>{ const t=e.results[0][0].transcript; addMsg(t,'me'); ask(t); };
  rec.onend=()=>{ listening=false; $('micBtn').classList.remove('on'); if($('state').textContent==='מקשיב')setState(''); };
  rec.onerror=(e)=>{ listening=false; $('micBtn').classList.remove('on'); setState('');
    const m={'not-allowed':'אין הרשאת מיקרופון. אשר גישה, והרץ מ-localhost.','service-not-allowed':'הדיבור חסום — הרץ מ-http://localhost.','network':'זיהוי דיבור דורש הרצה מ-localhost (לא file://).'}[e.error];
    addMsg(m||('שגיאת מיקרופון: '+e.error),'sys'); }; }
function toggleMic(){ if(!rec){ addMsg('זיהוי דיבור נתמך ב-Chrome / Edge.','sys'); return; }
  if(!window.isSecureContext){ addMsg('המיקרופון חסום כי הקובץ נפתח ישירות. הרץ מ-http://localhost.','sys'); return; }
  if(listening){ rec.stop(); return; }
  speechSynthesis.cancel(); listening=true; $('micBtn').classList.add('on'); setState('listening'); rec.start(); }

/* ---------- input + chrome ---------- */
function send(){ const t=$('input').value.trim(); if(!t)return; $('input').value=''; addMsg(t,'me'); ask(t); }
$('sendBtn').onclick=send; $('input').addEventListener('keydown',e=>{ if(e.key==='Enter')send(); }); $('micBtn').onclick=toggleMic;
document.querySelectorAll('.menu button').forEach(b=>b.onclick=()=>{ $('input').value=b.dataset.p; $('input').focus(); });
$('newChat').onclick=()=>{ state.history=[]; $('chat').innerHTML=''; addMsg(state.name+' מוכן. שיחה חדשה.','al'); };
$('logout').onclick=()=>openSetup();
$('cmdBtn').onclick=()=>openSetup();

/* ---------- setup ---------- */
function openSetup(){ $('nameInput').value=state.name; $('keyInput').value=state.key; $('overlay').classList.add('show'); }
$('saveBtn').onclick=()=>{ state.name=$('nameInput').value.trim()||'ALPHA'; state.key=$('keyInput').value.trim();
  localStorage.setItem('alpha_name',state.name); localStorage.setItem('alpha_key',state.key);
  $('overlay').classList.remove('show');
  if(state.history.length===0) addMsg(state.name+' מקוון. דבר אליי או כתוב.','al'); };

/* ---------- boot ---------- */
if(!window.isSecureContext) setTimeout(()=>addMsg('נפתח ישירות (file://) — הצ\'אט יעבוד, אך הקול דורש הרצה מ-http://localhost.','sys'),400);
if(!state.key){ openSetup(); } else { addMsg(state.name+' מקוון. דבר אליי או כתוב.','al'); }
</script>
</body>
</html>
